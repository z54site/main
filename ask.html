<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заполнение анкеты</title>
    <style>
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.8) 45%, rgba(255,255,255,0.0) 100%),
                        url("img1.jpg") center bottom / cover no-repeat;
            background-attachment: fixed;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: transparent;
            z-index: 10;

            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 0 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
        }

        .logo a {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 5px;
        }

        .logo img {
            height: 40px;
            display: block;
            object-fit: contain;
        }

        .about-link {
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            height: 100%;
            padding: 0 5px;
        }

        .center-content {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -60%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 5;
        }

        .vertical-inputs {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: flex-start;
            width: 100%;
            max-width: 520px;

            position: relative;
        }

        .question {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .question label {
            color: black;
            font-size: 16px;
            user-select: none;
        }

        .question textarea {
            width: 440px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.45);
            background: rgba(255,255,255,0.95);
            color: black;
            padding: 8px 12px;
            font-size: 16px;
            line-height: 1.3;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .question textarea::placeholder {
            color: rgba(0,0,0,0.55);
        }

        .question textarea:focus {
            border-color: rgba(0,0,0,0.6);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            background: rgba(255,255,255,1);
        }

        .submit-btn {
            width: 440px;
            height: 45px;
            border: 1px solid black;
            border-radius: 10px;
            background: rgba(255,255,255,0.95);
            color: black;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent; 
        }

        .submit-btn:hover {
            background: rgba(255,255,255,1);
        }

        .submit-btn:active {
            background: rgba(235,235,235,1);
        }

        #error-message {
            position: absolute;
            top: 100%;
            left: 0;
            width: 440px;
            margin-top: 10px;

            color: #FF0000;
            font-size: 40px;
            text-align: center;
        }


        @media (max-width: 600px) {

            html, body {
                overflow: auto;
            }

            header {
                padding: 0 15px;
            }

            .logo img {
                height: 32px;
            }

            .about-link {
                font-size: 18px;
            }

            .center-content {
                width: 90%;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                position: relative;
                margin-top: 90px;
                margin-bottom: 180px;
            }

            .vertical-inputs {
                width: 100%;
                max-width: 100%;
                gap: 18px;
            }

            .question textarea {
                width: 100%;
                height: 40px;
                font-size: 16px; 
            }

            .submit-btn {
                width: 100%;
                min-height: 48px;
            }

            #error-message {
                width: 100%;
                font-size: 26px;
                position: relative;
                top: 0;
            }

        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" aria-label="На главную">
                <img src="img2.jpg" alt="Логотип">
            </a>
        </div>

        <a href="about.html" class="about-link">О нас</a>
    </header>


    <main class="center-content">
        <div class="vertical-inputs">

            <div class="question">
                <label function="q1">Какое звание?</label>
                <textarea id="q1" name="q1" placeholder="Трипл элита +"></textarea>
            </div>
            
            <div class="question">
                <label function="q2">Сколько часов в игре?</label>
                <textarea id="q2" name="q2" placeholder="400+"></textarea>
            </div>

            <div class="question">
                <label function="q3">Какой возраст?</label>
                <textarea id="q3" name="q3" placeholder="15+"></textarea>
            </div>

            <div class="question">
                <label function="q4">Время активности?</label>
                <textarea id="q4" name="q4" placeholder="Рекомендуется 16-22"></textarea>
            </div>

            <div class="question">
                <label function="q5">Как с вами связаться?</label>
                <textarea id="q5" name="q5" placeholder="Ваш Telegram, Discord, другое"></textarea>
            </div>

            <button class="submit-btn" onclick="checkForm()">
                Отправить анкету
            </button>

        </div>
    </main>


    <script>
        function checkForm() {
        const fields = [
            document.getElementById('q1'),
            document.getElementById('q2'),
            document.getElementById('q3'),
            document.getElementById('q4'),
            document.getElementById('q5'),
        ];

        let allFilled = true;

        fields.forEach(field => {
            if (field.value.trim() === '') {
                field.style.borderColor = 'red';
                allFilled = false;
            } else {
                field.style.borderColor = 'rgba(0,0,0,0.2)';
            }
        });

        if (allFilled) {
            window.location.href = 'thanks.html';
        }
    }
</script>

</body>
</html>
